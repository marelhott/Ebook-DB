services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DB_DRIVER: sqlite
      DB_DSN: file:/data/book-universe.db
      STORAGE_ROOT: /data/storage
      AI_WORKER_URL: http://ai-worker:8000
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    depends_on:
      - ai-worker

  ai-worker:
    build:
      context: ./ai-worker
    environment:
      APP_ENV: development
      WORKER_HOST: 0.0.0.0
      WORKER_PORT: 8000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      UPLOAD_ROOT: /data/uploads
      TRANSLATION_OUTPUT_ROOT: /data/translations
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      OPENLIBRARY_BASE_URL: ${OPENLIBRARY_BASE_URL:-https://openlibrary.org}
      OPENLIBRARY_APP_NAME: ${OPENLIBRARY_APP_NAME:-BookUniverse}
      OPENLIBRARY_CONTACT: ${OPENLIBRARY_CONTACT:-contact@example.org}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      DEEPL_API_BASE_URL: ${DEEPL_API_BASE_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
